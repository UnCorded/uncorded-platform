    if (ev.key === 'Escape') { ev.preventDefault(); closeLightbox(); }
    else if (ev.key === 'ArrowLeft')  { ev.preventDefault(); stepLightbox(-1); }
    else if (ev.key === 'ArrowRight') { ev.preventDefault(); stepLightbox(1); }
  });

  // Delegated handler — image grid items open the lightbox.
  function attachImageClickHandler(rootEl) {
    if (!rootEl) return;
    rootEl.addEventListener('click', function (ev) {
      var img = ev.target && ev.target.closest && ev.target.closest('.att-img');
      if (!img) return;
      var grid = img.parentElement;
      var idx = parseInt(img.getAttribute('data-att-index') || '0', 10);
      openLightboxFromGrid(grid, idx);
    });
    rootEl.addEventListener('keydown', function (ev) {
      if (ev.key !== 'Enter' && ev.key !== ' ') return;
      var img = ev.target && ev.target.closest && ev.target.closest('.att-img');
      if (!img) return;
      ev.preventDefault();
      var grid = img.parentElement;
      var idx = parseInt(img.getAttribute('data-att-index') || '0', 10);
      openLightboxFromGrid(grid, idx);
    });
  }

  // Delegated handler — every attachment card surface routes its clicks
  // through the shell. We do this rather than letting plugin-iframe anchors
  // handle preview/download themselves because:
  //   - Cross-origin `<a download>` is silently ignored by Chromium, so the
  //     filename has to come from `Content-Disposition`.
  //   - On Linux Electron, the `setWindowOpenHandler` → `webContents
  //     .downloadURL` popup-intercept path drops the download entirely; the
  //     desktop bridge exposes a direct main-process download instead.
  //   - The fullscreen preview overlay must live outside the plugin sandbox
  //     so PDFium can render (sandboxed nested iframes inherit an opaque
  //     origin and the renderer refuses to paint there).
  //
  // The same handler covers the entire card body (data-att-action on the
  // outer `.att-card`) and the icon-only download / preview buttons.
  function attachPreviewClickHandler(rootEl) {
    if (!rootEl) return;
    rootEl.addEventListener('click', function (ev) {
      var target = ev.target;
      if (!target || !target.closest) return;
      // Specific action buttons (download / preview icons / audio controls)
      // take precedence over the card-wide body click so e.g. the eye on a
      // PDF card opens the preview overlay rather than re-firing whatever
      // the card's body action is. closest() walks up the DOM so a click on
      // the inner SVG still resolves to the surrounding button.
      var actionEl = target.closest('[data-att-action]');
      if (!actionEl) return;
      var action = actionEl.getAttribute('data-att-action') || '';

      // Audio actions are local to the custom player and don't carry a URL —
      // we route them before the url-required preview/download check. Seek
      // and volume sliders aren't here because they need drag (pointer
      // capture); those are wired directly on the elements in wireAudioPlayer.
      if (action === 'audio-toggle') {
        ev.preventDefault();
        var togglePlayer = actionEl.closest('.att-audio');
        var toggleAudio = togglePlayer && togglePlayer.querySelector('audio');
        if (toggleAudio) {
          if (toggleAudio.paused) toggleAudio.play().catch(function () {});
          else toggleAudio.pause();
        }
        return;
      }
      if (action === 'audio-mute-toggle') {
        ev.preventDefault();
        var mutePlayer = actionEl.closest('.att-audio');
        var muteAudio = mutePlayer && mutePlayer.querySelector('audio');
        if (muteAudio) {
          muteAudio.muted = !muteAudio.muted;
          sharedAudioMuted = muteAudio.muted;
          // If unmuting from zero, bump to a reasonable level so the user
          // actually hears something instead of silently un-toggling.
          if (!muteAudio.muted && (muteAudio.volume === 0 || sharedAudioVolume === 0)) {
            muteAudio.volume = 0.5;
            sharedAudioVolume = 0.5;
          }
          syncSharedAudioState(muteAudio);
          refreshAudioPlayerUI(mutePlayer);
        }
        return;
      }

      var url = actionEl.getAttribute('data-att-url') || '';
      var name = actionEl.getAttribute('data-att-name') || '';
      if (!url) return;
      ev.preventDefault();
      if (action === 'preview') {
        sdk.platform.files.preview({ url: url, name: name });
      } else if (action === 'download') {
        sdk.platform.files.download({ url: url, name: name });
      }
    });
  }

  // Shared volume + mute across every audio player on the page. Set the
  // volume on one and the others follow — discord-style "channel volume."
  // Lives in module scope so newly-rendered players pick up the current
  // value at wire time.
  var sharedAudioVolume = 1;
  var sharedAudioMuted = false;

  // Wire per-element audio listeners (timeupdate, loadedmetadata, play/pause)
  // and pointer-based drag for the seek + volume sliders. Idempotent — uses
  // a wired flag so re-running on the same subtree is harmless.
  function initAudioPlayers(rootEl) {
    if (!rootEl) return;
    var players = rootEl.querySelectorAll('.att-audio[data-audio-wired="0"]');
    for (var i = 0; i < players.length; i++) wireAudioPlayer(players[i]);
  }

  function fmtAudioTime(s) {
    if (!isFinite(s) || s < 0) return '--:--';
    var m = Math.floor(s / 60);
    var sec = Math.floor(s % 60);
    return m + ':' + (sec < 10 ? '0' : '') + sec;
  }

  function refreshAudioPlayerUI(player) {
    if (!player) return;
    var audio = player.querySelector('audio');
    var fill = player.querySelector('.att-audio-track-fill');
    var thumb = player.querySelector('.att-audio-track-thumb');
    var timeEl = player.querySelector('.att-audio-time');
    var track = player.querySelector('.att-audio-track');
    var volFill = player.querySelector('.att-audio-volume-fill');
    var volThumb = player.querySelector('.att-audio-volume-thumb');
    var volTrack = player.querySelector('.att-audio-volume-track');
    if (!audio || !fill || !timeEl || !track || !volFill || !volTrack) return;
    var dur = isFinite(audio.duration) ? audio.duration : 0;
    var cur = audio.currentTime || 0;
    var seekPct = dur > 0 ? Math.min(100, (cur / dur) * 100) : 0;
    fill.style.width = seekPct + '%';
    if (thumb) thumb.style.left = seekPct + '%';
    timeEl.textContent = fmtAudioTime(cur) + ' / ' + fmtAudioTime(dur);
    track.setAttribute('aria-valuenow', String(Math.round(seekPct)));
    var volPct = audio.muted ? 0 : audio.volume * 100;
    volFill.style.width = volPct + '%';
    if (volThumb) volThumb.style.left = volPct + '%';
    volTrack.setAttribute('aria-valuenow', String(Math.round(volPct)));
    if (audio.muted) player.classList.add('is-muted');
    else player.classList.remove('is-muted');
  }

  // Push the current sharedAudioVolume / sharedAudioMuted onto every audio
  // element on the page (except `except` — which usually already has the
  // value set as the source of the change) and refresh each player's UI.
  function syncSharedAudioState(except) {
    var all = document.querySelectorAll('.att-audio audio');
    for (var i = 0; i < all.length; i++) {
      if (all[i] !== except) {
        all[i].volume = sharedAudioVolume;
        all[i].muted = sharedAudioMuted;
      }
      var p = all[i].closest('.att-audio');
      if (p) refreshAudioPlayerUI(p);
    }
  }

  // Generic pointerdown-to-drag binding. `onValue(pct)` fires on initial
  // press and every move, with `pct` clamped to [0, 1]. Pointer capture
  // means moves outside the element still drive the handler — drag feels
  // continuous even when the cursor leaves the bar.
  function bindSliderDrag(el, onValue, onStart, onEnd) {
    el.addEventListener('pointerdown', function (ev) {
      if (ev.button !== undefined && ev.button !== 0) return;
      ev.preventDefault();
      try { el.setPointerCapture(ev.pointerId); } catch (_) {}
      if (onStart) onStart();
      fire(ev);
      function fire(e) {
        var rect = el.getBoundingClientRect();
        var pct = rect.width > 0
          ? Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width))
          : 0;
        onValue(pct);
      }
      function move(e) { fire(e); }
      function up() {
        try { el.releasePointerCapture(ev.pointerId); } catch (_) {}
        el.removeEventListener('pointermove', move);
        el.removeEventListener('pointerup', up);
        el.removeEventListener('pointercancel', up);
        if (onEnd) onEnd();
      }
      el.addEventListener('pointermove', move);
      el.addEventListener('pointerup', up);
      el.addEventListener('pointercancel', up);
    });
  }

  function wireAudioPlayer(player) {
    player.setAttribute('data-audio-wired', '1');
    var audio = player.querySelector('audio');
    var playBtn = player.querySelector('.att-audio-play');
    var track = player.querySelector('.att-audio-track');
    var volTrack = player.querySelector('.att-audio-volume-track');
    if (!audio || !playBtn || !track || !volTrack) return;

    audio.volume = sharedAudioVolume;
    audio.muted = sharedAudioMuted;

    audio.addEventListener('loadedmetadata', function () { refreshAudioPlayerUI(player); });
    audio.addEventListener('timeupdate', function () { refreshAudioPlayerUI(player); });
    audio.addEventListener('volumechange', function () { refreshAudioPlayerUI(player); });
    audio.addEventListener('play', function () {
      player.classList.add('is-playing');
      playBtn.setAttribute('aria-label', 'Pause audio');
      // Only one audio plays at a time — pause every other player on the page.
      var all = document.querySelectorAll('.att-audio audio');
      for (var i = 0; i < all.length; i++) {
        if (all[i] !== audio && !all[i].paused) all[i].pause();
      }
    });
    audio.addEventListener('pause', function () {
      player.classList.remove('is-playing');
      playBtn.setAttribute('aria-label', 'Play audio');
    });
    audio.addEventListener('ended', function () {
      player.classList.remove('is-playing');
      playBtn.setAttribute('aria-label', 'Play audio');
    });

    bindSliderDrag(track,
      function (pct) {
        if (!isFinite(audio.duration) || audio.duration <= 0) return;
        audio.currentTime = pct * audio.duration;
        refreshAudioPlayerUI(player);
      },
      function () { player.classList.add('is-seeking'); },
      function () { player.classList.remove('is-seeking'); }
    );

    bindSliderDrag(volTrack,
      function (pct) {
        audio.muted = false;
        audio.volume = pct;
        sharedAudioVolume = pct;
        sharedAudioMuted = false;
        syncSharedAudioState(audio);
      },
      function () { player.classList.add('is-volume-dragging'); },
      function () { player.classList.remove('is-volume-dragging'); }
    );

    refreshAudioPlayerUI(player);
  }

  // ── Token parsing ──────────────────────────────────────────────────────────
  function parseToken(token) {
    try {
      var parts = token.split('.');
      var payload = JSON.parse(atob(parts[1]));
      myUserId = payload.sub || payload.user_id || null;
    } catch (_) {
      myUserId = null;
    }
  }

  // ── Input state ────────────────────────────────────────────────────────────
  function enableInput() {
    sendBtn.disabled = false;
    if (currentChannelName) {
      inputEl.placeholder = 'Message #' + currentChannelName;
    }
  }

  // ── Navigate to channel ────────────────────────────────────────────────────
  function navigateTo(channelId) {
    request('getChannels', {}).then(function (channels) {
      var ch = null;
      for (var i = 0; i < channels.length; i++) {
        if (channels[i].id === channelId) { ch = channels[i]; break; }
      }
      selectChannel(channelId, ch ? ch.name : channelId, ch ? ch.topic : '');
    }).catch(function () {
      selectChannel(channelId, channelId, '');
    });
  }

  function selectChannel(id, name, topic) {
    var prevChannelId  = currentChannelId;
    currentChannelId   = id;
    currentChannelName = name;

    inputEl.placeholder = 'Message #' + name;

    // Viewer presence: leave the previous channel's viewer scope and join the
    // new one. Without joining, broadcasted typing indicators for this channel
    // fan out to an empty audience and never reach us.
    if (prevChannelId && prevChannelId !== id) {
      request('setViewingChannel', { channel_id: prevChannelId, viewing: false }).catch(function () {});
    }
    request('setViewingChannel', { channel_id: id, viewing: true }).catch(function () {});

    // Clear and load messages
    msgList.innerHTML = '';
    typingBar.innerHTML = ''; // drop any stale "X is typing…" from the previous channel
    setStatus('Loading…');
    loadMessages();
  }

  // ── Messages ───────────────────────────────────────────────────────────────
  var lastDate = null;
  var lastAuthor = null;
  var lastAuthorName = '';
  var lastTs = 0;
  var GROUP_GAP = 5 * 60 * 1000; // 5 min

  function loadMessages() {
    if (!currentChannelId) return;
    // Guard against stale responses if the user switches channels mid-load.
    // Without this the previous channel's messages can flash into the new
    // channel and our group-state (lastAuthor / lastDate) gets corrupted.
    var loadingForChannelId = currentChannelId;
    request('getMessages', { channel_id: loadingForChannelId, limit: 50 }).then(function (msgs) {
      if (loadingForChannelId !== currentChannelId) return;
      setStatus('');
      msgList.innerHTML = '';
      lastDate = null; lastAuthor = null; lastAuthorName = ''; lastTs = 0;

      // getMessages returns newest-first — reverse to render oldest-first
      var ordered = msgs.slice().reverse();
      for (var i = 0; i < ordered.length; i++) {
        appendMessage(ordered[i], false);
      }

      // Show empty state if nothing
      if (ordered.length === 0) {
        var em = document.createElement('div');
        em.id = 'empty-state';
        em.innerHTML =
          '<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="opacity:.25"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>' +
          '<p>No messages yet.<br>Be the first to say something!</p>';
        msgList.appendChild(em);
      }

      scrollToBottom(true);
    }).catch(function (err) {
      if (loadingForChannelId !== currentChannelId) return;
      setStatus('Failed to load messages: ' + (err && err.message ? err.message : 'unknown error'));
    });
  }

  function appendMessage(msg, live) {
    var msgDate = fmtDate(msg.created_at);
    var isSameAuthor = (msg.author_id === lastAuthor) && (msg.author_name === lastAuthorName);
    var isClose     = (msg.created_at - lastTs) < GROUP_GAP;
    var isCont      = isSameAuthor && isClose && (msgDate === lastDate);

    if (msgDate !== lastDate) {
      var div = document.createElement('div');
      div.className = 'day-divider';
      div.textContent = msgDate;
      msgList.appendChild(div);
      lastDate = msgDate;
    }

    var el = document.createElement('div');
    el.setAttribute('data-msg-id', msg.id);

    var canEdit   = myUserId && msg.author_id === myUserId;
    var canDelete = myUserId && (msg.author_id === myUserId);

    var actionsHtml =
      '<div class="msg-actions" role="toolbar" aria-label="Message actions">' +
        '<button class="mabtn" type="button" title="React" aria-label="React" disabled>' +
          '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>' +
        '</button>' +
        '<button class="mabtn reply-btn" type="button" title="Reply in thread" aria-label="Reply in thread">' +
          '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 17 4 12 9 7"/><path d="M20 18v-2a4 4 0 0 0-4-4H4"/></svg>' +
        '</button>' +
        (canEdit
          ? '<button class="mabtn edit-btn" type="button" title="Edit message" aria-label="Edit message"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>'
          : '') +
        (canDelete
          ? '<button class="mabtn del delete-btn" type="button" title="Delete message" aria-label="Delete message"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg></button>'
          : '') +
        '<button class="mabtn more-btn" type="button" title="More actions" aria-label="More actions" aria-haspopup="menu">' +
          '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>' +
        '</button>' +
      '</div>';

    var editHtml =
      '<div class="edit-wrap">' +
        '<textarea class="edit-textarea" rows="1"></textarea>' +
        '<div class="edit-hints"><span>escape to <b>cancel</b> · enter to <b>save</b></span></div>' +
      '</div>';

    var editedTag = msg.edited_at
      ? '<span class="msg-edited-tag">(edited)</span>'
      : '';

    var pillHtml = replyPillHtml(msg);
    var attHtml = renderAttachmentsHtml(msg.attachments);

    if (isCont) {
      el.className = 'msg-cont';
      el.setAttribute('data-time', fmtTime(msg.created_at));
      el.innerHTML =
        actionsHtml +
        '<div class="msg-text">' + esc(msg.content) + editedTag + '</div>' +
        attHtml +
        editHtml +
        pillHtml;
    } else {
      el.className = 'msg';
      var displayName = msg.author_name || shortName(msg.author_id);
      var avatarMarkup = renderAuthorAvatar(msg.author_id, displayName, msg.author_avatar, 36);
      el.innerHTML =
        avatarMarkup +
        '<div class="msg-body">' +
          '<div class="msg-meta">' +
            '<span class="msg-author">' + esc(displayName) + '</span>' +
            '<span class="msg-ts">' + fmtTime(msg.created_at) + '</span>' +
          '</div>' +
          actionsHtml +
          '<div class="msg-text">' + esc(msg.content) + editedTag + '</div>' +
          attHtml +
          editHtml +
          pillHtml +
        '</div>';
    }

    wireMessageEl(el, msg);
    rememberPayload(el, msg);
    initAudioPlayers(el);
    msgList.appendChild(el);

    if (!msg.parent_message_id) cacheRoot(msg);

    lastAuthor     = msg.author_id;
    lastAuthorName = msg.author_name || '';
    lastTs     = msg.created_at;

    if (live) scrollToBottom(false);
  }

  function wireMessageEl(el, msg) {
    // Edit
    var editBtn = el.querySelector('.edit-btn');
    if (editBtn) {
      editBtn.addEventListener('click', function () { startEdit(el, msg); });
    }

    // Delete
    var delBtn = el.querySelector('.delete-btn');
    if (delBtn) {
      delBtn.addEventListener('click', function () { deleteMsg(el, msg.id); });
    }

    // Reply → open thread panel for this root
    var replyBtn = el.querySelector('.reply-btn');
    if (replyBtn) {
      replyBtn.addEventListener('click', function () { openThread(msg); });
    }

    // Reply pill → also opens the thread
    var pill = el.querySelector('.reply-pill');
    if (pill) {
      pill.addEventListener('click', function () { openThread(msg); });
    }

    // "…" overflow → open the same context menu as right-click / long-press.
    // Anchor to the button's bounding rect so it lands predictably in the
    // hover-bar's neighborhood instead of jumping to the pointer position.
    var moreBtn = el.querySelector('.more-btn');
    if (moreBtn) {
      moreBtn.addEventListener('click', function (ev) {
        ev.stopPropagation();
        var rect = moreBtn.getBoundingClientRect();
        openContextMenu(msg, el, rect.right, rect.bottom + 4, moreBtn);
      });
    }
  }

  // ── Context menu (right-click + long-press + "…" overflow) ───────────────
  // One shared menu, rebuilt per-open from the target message's permissions.
  // Source of truth for the message identity is the cached lookup keyed by
  // ctxMessageRef — never trust DOM-reflected attributes for id/permissions
  // because nodes can be replaced between open and item click.
  var ctxMessageRef    = null;       // the msg object the menu was opened for
  var ctxAnchorEl      = null;       // the row element (.msg / .msg-cont)
  var ctxFocusReturnEl = null;       // element to restore focus to on close
  var ctxIsCoarse      = false;      // last-open: was a touch/long-press?

  function isCoarsePointer() {
    return window.matchMedia && window.matchMedia('(hover: none)').matches;
  }

  // Lucide-style icons reused inside menu rows. Inline so the menu doesn't
  // depend on an external sprite — the iframe is already on a tight cache
  // window and an extra fetch isn't worth it for ~5 icons.
  var ICONS = {
    reply:  '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 17 4 12 9 7"/><path d="M20 18v-2a4 4 0 0 0-4-4H4"/></svg>',
    edit:   '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>',
    copy:   '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>',
    hash:   '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="9" x2="20" y2="9"/><line x1="4" y1="15" x2="20" y2="15"/><line x1="10" y1="3" x2="8" y2="21"/><line x1="16" y1="3" x2="14" y2="21"/></svg>',
    trash:  '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>',
  };

  function buildCtxItems(msg) {
    var canEdit   = !!(myUserId && msg.author_id === myUserId);
    var canDelete = canEdit;
    var isTombstone = msg.content === '[deleted]';
    var items = [];

    if (!isTombstone) {
      items.push({ id: 'reply', label: 'Reply in thread', icon: ICONS.reply });
      if (canEdit) items.push({ id: 'edit', label: 'Edit message', icon: ICONS.edit });
      items.push({ id: 'copy', label: 'Copy text', icon: ICONS.copy });
    }
    items.push({ id: 'copyId', label: 'Copy message ID', icon: ICONS.hash });
    if (canDelete && !isTombstone) {
      items.push({ divider: true });
      items.push({ id: 'delete', label: 'Delete message', icon: ICONS.trash, danger: true });
    }
    return items;
  }

  function renderCtxItems(items) {
    var html = '';
    for (var i = 0; i < items.length; i++) {
      var it = items[i];
      if (it.divider) { html += '<div class="ctx-divider" role="separator"></div>'; continue; }
      var cls = 'ctx-item' + (it.danger ? ' danger' : '');
      html += '<button type="button" class="' + cls + '" role="menuitem" data-ctx-id="' + esc(it.id) + '">' +
              '<span class="ctx-icon" aria-hidden="true">' + it.icon + '</span>' +
              '<span>' + esc(it.label) + '</span>' +
              '</button>';
    }
    return html;
  }

  // Place menu near (x, y) but clamp inside the viewport. Skipped on coarse
  // pointers — there the CSS @media block pins the menu to the bottom edge.
  function placeCtxMenu(x, y) {
    if (ctxIsCoarse) return;
    // Reset any previous bottom-anchored positioning before measuring.
    ctxMenuEl.style.left = '0px';
    ctxMenuEl.style.top  = '0px';
    var rect = ctxMenuEl.getBoundingClientRect();
    var w = rect.width, h = rect.height;
    var vw = window.innerWidth, vh = window.innerHeight;
    var px = Math.max(8, Math.min(x, vw - w - 8));
    var py = Math.max(8, Math.min(y, vh - h - 8));
    ctxMenuEl.style.left = px + 'px';
    ctxMenuEl.style.top  = py + 'px';
  }

  function openContextMenu(msg, anchorEl, x, y, focusReturn) {
    ctxMessageRef    = msg;
    ctxAnchorEl      = anchorEl;
    ctxFocusReturnEl = focusReturn || (anchorEl && anchorEl.querySelector ? anchorEl.querySelector('.more-btn') : null);
    ctxIsCoarse      = isCoarsePointer();

    var items = buildCtxItems(msg);
    if (items.length === 0) return;

    ctxMenuEl.innerHTML = renderCtxItems(items);
    ctxMenuEl.setAttribute('aria-hidden', 'false');
    ctxBackdropEl.setAttribute('aria-hidden', 'false');

    // Open backdrop first on coarse pointers so the sheet animates in over
    // the dimmed background; on desktop we skip the dim entirely.
    if (ctxIsCoarse) {
      ctxBackdropEl.setAttribute('data-open', 'true');
    }
    ctxMenuEl.setAttribute('data-open', 'true');

    if (!ctxIsCoarse) {
      // Place after data-open flips so the menu has its real layout box.
      // Wait one rAF for the transition's starting transform to commit before
      // measuring, otherwise getBoundingClientRect returns the pre-open box
      // (translateY(-4px) scale(0.98)) and clamping math is off by a few px.
      requestAnimationFrame(function () { placeCtxMenu(x, y); });
    }

    // Move keyboard focus into the menu so Tab / arrow keys work.
    var first = ctxMenuEl.querySelector('.ctx-item');
    if (first) {
      try { first.focus({ preventScroll: true }); } catch (_) { first.focus(); }
    }
  }

  function closeContextMenu() {
    if (ctxMenuEl.getAttribute('data-open') !== 'true') return;
    ctxMenuEl.setAttribute('data-open', 'false');
    ctxBackdropEl.setAttribute('data-open', 'false');
    ctxMenuEl.setAttribute('aria-hidden', 'true');
    ctxBackdropEl.setAttribute('aria-hidden', 'true');
    var ret = ctxFocusReturnEl;
    ctxMessageRef = null;
    ctxAnchorEl = null;
    ctxFocusReturnEl = null;
    if (ret && typeof ret.focus === 'function') {
      try { ret.focus({ preventScroll: true }); } catch (_) { try { ret.focus(); } catch (__) {} }
    }
  }

  function handleCtxAction(actionId) {
    var msg = ctxMessageRef;
    if (!msg) { closeContextMenu(); return; }
    // Resolve the live row (may have been re-rendered between open + click).
    var row = ctxAnchorEl;
    if (!row || !row.isConnected) {
      row = document.querySelector('[data-msg-id="' + msg.id + '"]') ||
            (threadMsgsEl ? threadMsgsEl.querySelector('[data-reply-id="' + msg.id + '"]') : null);
    }
    closeContextMenu();
    switch (actionId) {
      case 'reply':  openThread(msg); break;
      case 'edit':   if (row) startEdit(row, msg); break;
      case 'copy':   copyToClipboard(msg.content || ''); break;
      case 'copyId': copyToClipboard(msg.id || ''); break;
      case 'delete': if (row) deleteMsg(row, msg.id); break;
    }
  }

  // Clipboard with a degraded fallback. The async API is preferred; in
  // sandboxed iframes without `clipboard-write` permission it rejects, and
  // execCommand('copy') against a hidden textarea still works as long as the
  // call originates from a trusted user-gesture handler (a menu click does).
  function copyToClipboard(text) {
    var s = String(text == null ? '' : text);
    function fallback() {
      try {
        var ta = document.createElement('textarea');
        ta.value = s;
        ta.setAttribute('readonly', '');
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        ta.style.pointerEvents = 'none';
        document.body.appendChild(ta);
        ta.select();
        var ok = document.execCommand && document.execCommand('copy');
        ta.remove();
        if (!ok) setStatus('Copy not supported in this view.');
      } catch (_) {
        setStatus('Copy not supported in this view.');
      }
    }
    if (navigator.clipboard && typeof navigator.clipboard.writeText === 'function') {
      navigator.clipboard.writeText(s).catch(fallback);
    } else {
      fallback();
    }
  }

  // Menu interaction: clicks (delegated), Escape, outside-click, scroll.
  ctxMenuEl.addEventListener('click', function (ev) {
    var btn = ev.target && ev.target.closest && ev.target.closest('.ctx-item');
    if (!btn) return;
    handleCtxAction(btn.getAttribute('data-ctx-id'));
  });

  ctxMenuEl.addEventListener('keydown', function (ev) {
    if (ev.key === 'Escape') { ev.preventDefault(); closeContextMenu(); return; }
    if (ev.key !== 'ArrowDown' && ev.key !== 'ArrowUp' && ev.key !== 'Home' && ev.key !== 'End') return;
    ev.preventDefault();
    var items = Array.prototype.slice.call(ctxMenuEl.querySelectorAll('.ctx-item'));
    if (items.length === 0) return;
    var idx = items.indexOf(document.activeElement);
    if (ev.key === 'Home') idx = 0;
    else if (ev.key === 'End') idx = items.length - 1;
    else if (ev.key === 'ArrowDown') idx = (idx < 0 ? 0 : (idx + 1) % items.length);
    else if (ev.key === 'ArrowUp')   idx = (idx <= 0 ? items.length - 1 : idx - 1);
    items[idx].focus();
  });

  ctxBackdropEl.addEventListener('click', closeContextMenu);
  // Outside-click for the desktop case (no backdrop covering the page).
  document.addEventListener('mousedown', function (ev) {
    if (ctxMenuEl.getAttribute('data-open') !== 'true') return;
    if (ctxMenuEl.contains(ev.target)) return;
    closeContextMenu();
  });
  // Any scroll while open: dismiss to avoid the menu floating away from its
  // anchor (cheaper than tracking the anchor on every scroll tick).
  window.addEventListener('scroll', function () { closeContextMenu(); }, true);
  window.addEventListener('resize', function () { closeContextMenu(); });

  // Long-press detection for coarse pointers. We attach at the message-list
  // level (event delegation) so adding/removing rows doesn't require
  // attach/detach bookkeeping. 480ms feels long enough that scroll + tap
  // gestures don't fire it, short enough that it's not perceptibly sluggish.
  function attachLongPress(rootEl) {
    if (!rootEl) return;
    var pressTimer = null;
    var startX = 0, startY = 0;
    var pressedRow = null;
    var pressedMsg = null;
    var fired = false;

    function clearTimer() {
      if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
    }
    function reset() {
      clearTimer();
      pressedRow = null;
      pressedMsg = null;
      fired = false;
    }

    rootEl.addEventListener('pointerdown', function (ev) {
      // Only touch / pen — mouse uses contextmenu (handled separately).
      if (ev.pointerType !== 'touch' && ev.pointerType !== 'pen') return;
      // Don't trigger on interactive children (avatar buttons, pills, action
      // bar). Long-pressing the row body itself is the discoverable gesture.
      if (ev.target.closest('button, a, textarea, input, .reply-pill, .msg-author-avatar')) return;
      var row = ev.target.closest('[data-msg-id], [data-reply-id]');
      if (!row) return;
      var msg = resolveMsgFromRow(row);
      if (!msg) return;
      pressedRow = row;
      pressedMsg = msg;
      startX = ev.clientX;
      startY = ev.clientY;
      fired = false;
      pressTimer = setTimeout(function () {
        fired = true;
        if (navigator.vibrate) { try { navigator.vibrate(8); } catch (_) {} }
        openContextMenu(pressedMsg, pressedRow, startX, startY, null);
      }, 480);
    });

    rootEl.addEventListener('pointermove', function (ev) {
      if (!pressTimer) return;
      var dx = ev.clientX - startX, dy = ev.clientY - startY;
      if (dx * dx + dy * dy > 100) clearTimer(); // >10px movement cancels
    });

    rootEl.addEventListener('pointerup',     reset);
    rootEl.addEventListener('pointercancel', reset);
    rootEl.addEventListener('pointerleave',  reset);

    // If the long-press fired, swallow the synthetic click that follows so
    // we don't end up activating the avatar button or text selection.
    rootEl.addEventListener('click', function (ev) {
      if (fired) {
        ev.preventDefault();
        ev.stopPropagation();
        fired = false;
      }
    }, true);
  }

  // Right-click → same context menu. Attached at the same delegation roots
  // as long-press; `contextmenu` event is suppressed inside interactive
  // children where the browser/native menu is more useful (text selection
  // copy, link inspect).
  function attachRightClick(rootEl) {
    if (!rootEl) return;
    rootEl.addEventListener('contextmenu', function (ev) {
      if (isCoarsePointer()) return; // touch path uses long-press
      // Allow native menu over the input field (text-edit affordances) and
      // over avatar buttons (where the platform might offer "save image").
      if (ev.target.closest('button, a, textarea, input, img')) return;
      var row = ev.target.closest('[data-msg-id], [data-reply-id]');
      if (!row) return;
      var msg = resolveMsgFromRow(row);
      if (!msg) return;
      ev.preventDefault();
      openContextMenu(msg, row, ev.clientX, ev.clientY, null);
    });
  }

  // Reverse-lookup: given a row DOM node, find the corresponding message
  // object. We keep a per-id WeakMap of payloads attached at append time so
  // the menu can act on the live snapshot rather than parsing innerHTML.
  var msgPayloadById = new Map();
  function rememberPayload(row, msg) {
    if (!row || !msg) return;
    var key = row.getAttribute('data-msg-id') || row.getAttribute('data-reply-id');
    if (key) msgPayloadById.set(key, msg);
  }
  function resolveMsgFromRow(row) {
    var key = row.getAttribute('data-msg-id') || row.getAttribute('data-reply-id');
    return key ? (msgPayloadById.get(key) || null) : null;
  }

  // ── Thread reply pill ──────────────────────────────────────────────────────
  // State lives in the classname (has-unread) rather than a separate child
  // badge. The whole pill turns accent-colored when there are unread replies;
  // this is both more legible at a glance and more honest about the
  // invariant: the pill represents a thread, not two stacked indicators.
  function replyPillHtml(msg) {
    var count = msg.reply_count || 0;
    if (count <= 0) return '';
    var unread = unreadDelta(msg);
    var label = count === 1 ? '1 reply' : count + ' replies';
    var when = msg.last_reply_at ? fmtAgo(msg.last_reply_at) : '';
    var cls = unread > 0 ? 'reply-pill has-unread' : 'reply-pill';
    // message-circle: universal threading/chat icon, matches the reply
    // icon used in the message action bar.
    var icon =
      '<span class="reply-icon" aria-hidden="true">' +
        '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">' +
          '<path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>' +
        '</svg>' +
      '</span>';
    return (
      '<button class="' + cls + '" type="button">' +
        icon +
        '<span class="reply-count">' + esc(label) + '</span>' +
        (when ? '<span class="reply-when">· ' + esc(when) + '</span>' : '') +
      '</button>'
    );
  }

  function fmtAgo(ts) {
    var diff = Date.now() - ts;
    if (diff < 60_000) return 'just now';
    if (diff < 3_600_000) return Math.floor(diff / 60_000) + 'm ago';
    if (diff < 86_400_000) return Math.floor(diff / 3_600_000) + 'h ago';
    return fmtDate(ts);
  }

  function refreshPillFor(msg) {
    var row = document.querySelector('[data-msg-id="' + msg.id + '"]');
    if (!row) return;
    var existing = row.querySelector('.reply-pill');
    var html = replyPillHtml(msg);
    if (!existing) {
      if (!html) return;
      // Attach into msg-body (or msg-cont root) after the text/edit area
      var body = row.querySelector('.msg-body') || row;
      body.insertAdjacentHTML('beforeend', html);
      var pill = body.querySelector('.reply-pill');
      if (pill) pill.addEventListener('click', function () { openThread(msg); });
    } else if (!html) {
      existing.remove();
    } else {
      existing.outerHTML = html;
      var newPill = row.querySelector('.reply-pill');
      if (newPill) newPill.addEventListener('click', function () { openThread(msg); });
    }
  }

  // ── localStorage unread tracking ───────────────────────────────────────────
  function lastViewedKey(messageId) { return 'uncorded.threadRead.' + messageId; }
  function markThreadViewed(messageId, ts) {
    try { localStorage.setItem(lastViewedKey(messageId), String(ts)); } catch (_) {}
  }
  function lastViewed(messageId) {
    try { return parseInt(localStorage.getItem(lastViewedKey(messageId)) || '0', 10) || 0; } catch (_) { return 0; }
  }
  function unreadDelta(rootMsg) {
    if (!rootMsg.last_reply_at || !rootMsg.reply_count) return 0;
    var seen = lastViewed(rootMsg.id);
    return rootMsg.last_reply_at > seen ? rootMsg.reply_count : 0;
  }

  // Cache root messages by id so pill updates survive after getMessages
  var rootMsgCache = new Map();
  function cacheRoot(msg) { rootMsgCache.set(msg.id, msg); }
  function updateRootCounters(parentId, lastReplyAt) {
    var m = rootMsgCache.get(parentId);
    if (!m) return null;
    m.reply_count = (m.reply_count || 0) + 1;
    m.last_reply_at = lastReplyAt;
    return m;
  }

  // ── Inline edit ────────────────────────────────────────────────────────────
  function startEdit(el, msg) {
    el.classList.add('is-editing');
    var ta = el.querySelector('.edit-textarea');
    ta.value = msg.content;
    autoResize(ta);
    ta.focus();
    ta.setSelectionRange(ta.value.length, ta.value.length);

    function save() {
      var newContent = ta.value.trim();
      if (!newContent || newContent === msg.content) { cancelEdit(); return; }
      request('editMessage', { message_id: msg.id, content: newContent }).then(function (updated) {
        msg.content = updated.content;
        msg.edited_at = updated.edited_at;
        var textEl = el.querySelector('.msg-text');
        if (textEl) {
          textEl.innerHTML = esc(updated.content) + '<span class="msg-edited-tag">(edited)</span>';
        }
        cancelEdit();
      }).catch(function (err) {
        setStatus('Edit failed: ' + err.message);
        cancelEdit();
      });
    }

    function cancelEdit() {
      el.classList.remove('is-editing');
      ta.removeEventListener('keydown', onKey);
    }

    function onKey(e) {
      if (e.key === 'Escape') { e.preventDefault(); cancelEdit(); }
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); save(); }
      autoResize(ta);
    }

    ta.addEventListener('keydown', onKey);
  }

  // ── Delete ─────────────────────────────────────────────────────────────────
  function deleteMsg(el, msgId) {
    request('deleteMessage', { message_id: msgId }).then(function () {
      applyTombstone(msgId);
    }).catch(function (err) {
      setStatus('Delete failed: ' + err.message);
    });
  }

  // ============================================================================
  // Thread Panel
  // ============================================================================

  function openThread(rootMsg) {
    // Leave any in-progress typing scope before switching composers
    stopTypingIfActive();

    currentThreadId      = rootMsg.id;
    currentThreadRootMsg = Object.assign({}, rootMsg);
    threadReplies        = [];
    pendingThreadReplyIds.clear();

    renderThreadRoot();
    threadMsgsEl.innerHTML = '';
    threadTypingEl.innerHTML = '';
    threadPanel.classList.add('open');
    threadPanel.setAttribute('aria-hidden', 'false');
    threadSendBtn.disabled = false;

    // Update URL for deep-linking (best-effort; may fail in sandboxed iframes)
    try {
      var url = new URL(window.location.href);
      url.searchParams.set('thread', rootMsg.id);
      history.replaceState(null, '', url.toString());
    } catch (_) {}

    // Tell the backend we're viewing — this triggers viewers.updated fan-out.
    request('setViewingThread', { message_id: rootMsg.id, viewing: true }).catch(function () {});

    // Load replies
    loadThreadReplies(rootMsg.id);

    // Mark as viewed (wipe unread badge on this thread's pill)
    markThreadViewed(rootMsg.id, Date.now());
    refreshPillFor(rootMsg);

    setTimeout(function () { threadInputEl.focus(); }, 50);
  }

  function closeThread() {
    if (!currentThreadId) return;
    var leavingId = currentThreadId;
    currentThreadId      = null;
    currentThreadRootMsg = null;
    threadReplies        = [];
    threadPanel.classList.remove('open');
    threadPanel.setAttribute('aria-hidden', 'true');
    stopTypingIfActive();

    try {
      var url = new URL(window.location.href);
      url.searchParams.delete('thread');
      history.replaceState(null, '', url.toString());
    } catch (_) {}

    request('setViewingThread', { message_id: leavingId, viewing: false }).catch(function () {});
  }

  function renderThreadRoot() {
    if (!currentThreadRootMsg) {
      threadRootEl.innerHTML = '';
      threadRootEl.removeAttribute('data-msg-id');
      return;
    }
    var m = currentThreadRootMsg;
    var displayName = m.author_name || shortName(m.author_id);
    var editedTag = m.edited_at ? '<span class="msg-edited-tag">(edited)</span>' : '';
    var isTombstone = m.content === '[deleted]';
    var textClass = isTombstone ? 'msg-text is-deleted' : 'msg-text';
    var textContent = isTombstone ? 'This message was deleted.' : esc(m.content) + editedTag;
    var avatarMarkup = renderAuthorAvatar(m.author_id, displayName, m.author_avatar, 28);
    var attHtml = isTombstone ? '' : renderAttachmentsHtml(m.attachments);
    threadRootEl.setAttribute('data-msg-id', m.id);
    threadRootEl.innerHTML =
      avatarMarkup +
      '<div class="msg-body">' +
        '<div class="msg-meta">' +
          '<span class="msg-author">' + esc(displayName) + '</span>' +
          '<span class="msg-ts">' + fmtTime(m.created_at) + '</span>' +
        '</div>' +
        '<div class="' + textClass + '">' + textContent + '</div>' +
        attHtml +
      '</div>';
    rememberPayload(threadRootEl, m);
    initAudioPlayers(threadRootEl);
    threadSubEl.textContent = 'from #' + (currentChannelName || '');
  }

  function loadThreadReplies(messageId) {
    request('getThreadReplies', { message_id: messageId, limit: 100 }).then(function (replies) {
      if (currentThreadId !== messageId) return; // panel moved on
      threadReplies = replies;
      threadMsgsEl.innerHTML = '';
      for (var i = 0; i < replies.length; i++) {
        renderThreadReplyRow(replies[i]);
      }
      threadMsgsEl.scrollTop = threadMsgsEl.scrollHeight;
    }).catch(function (err) {
      threadMsgsEl.innerHTML = '<div style="padding:16px;color:var(--danger)">Failed to load: ' + esc(err.message) + '</div>';
    });
  }

  function renderThreadReplyRow(reply) {
    var displayName = reply.author_name || shortName(reply.author_id);
    var el = document.createElement('div');
    el.className = 'msg';
    el.setAttribute('data-reply-id', reply.id);
    if (pendingThreadReplyIds.has(reply.id)) el.classList.add('is-pending');
    var editedTag = reply.edited_at ? '<span class="msg-edited-tag">(edited)</span>' : '';
    var isTombstone = reply.content === '[deleted]';
    var textClass = isTombstone ? 'msg-text is-deleted' : 'msg-text';
    var textContent = isTombstone ? 'This message was deleted.' : esc(reply.content) + editedTag;
    var avatarMarkup = renderAuthorAvatar(reply.author_id, displayName, reply.author_avatar, 36);
    var attHtml = isTombstone ? '' : renderAttachmentsHtml(reply.attachments);
    el.innerHTML =
      avatarMarkup +
      '<div class="msg-body">' +
        '<div class="msg-meta">' +
          '<span class="msg-author">' + esc(displayName) + '</span>' +
          '<span class="msg-ts">' + fmtTime(reply.created_at) + '</span>' +
        '</div>' +
        '<div class="' + textClass + '">' + textContent + '</div>' +
        attHtml +
      '</div>';
    rememberPayload(el, reply);
    initAudioPlayers(el);
    threadMsgsEl.appendChild(el);
    threadMsgsEl.scrollTop = threadMsgsEl.scrollHeight;
  }

  function appendThreadReply(reply) {
    // Dedupe if we already rendered (e.g. optimistic reply matched by content)
    if (threadMsgsEl.querySelector('[data-reply-id="' + reply.id + '"]')) return;
    // If this is our own message that we already rendered optimistically with
    // a tmp id, reconcile by replacing the pending row.
    if (reply.author_id === myUserId) {
      var pendingNode = threadMsgsEl.querySelector('.is-pending[data-pending-content="' + encodeURIComponent(reply.content) + '"]');
      if (pendingNode) {
        pendingNode.remove();
      }
    }
    threadReplies.push(reply);
    renderThreadReplyRow(reply);
    markThreadViewed(reply.parent_message_id, Date.now());
  }

  function sendThreadReply() {
    if (!currentThreadId) return;
    var content = threadInputEl.value.trim();
    var hasTray = attachState.thread.length > 0;
    if (!content && !hasTray) return;
    var channelId = currentChannelId;
    var parentId = currentThreadId;
    waitForUploads('thread').then(function () {
      if (hasErrors('thread')) {
        setStatus('Some uploads failed. Remove or retry the failed attachments before sending.');
        return;
      }
      var atts = collectAttachments('thread');
      if (!content && atts.length === 0) return;
      threadInputEl.value = '';
      autoResize(threadInputEl);
      clearTray('thread');
      submitThreadReply(content, channelId, parentId, atts);
    });
  }

  // Factored from sendThreadReply so failed sends can retry without
  // re-reading the input (which the user may have moved on from). Snapshots
  // channelId + parentId at call time so a retry from a stale row still
  // posts to the original thread, not whichever thread is currently open.
  // Attachments are snapshotted too — retries replay the same server-issued
  // filenames (orphan GC will not touch attachments still referenced by an
  // in-flight retry because the server only sweeps disk minus DB refs).
  function submitThreadReply(content, channelId, parentId, attachments) {
    stopTypingIfActive();
    var atts = attachments || [];

    var tmpId = 'tmp_' + Math.random().toString(36).slice(2);
    var optimistic = {
      id: tmpId,
      channel_id: channelId,
      author_id: myUserId || '?',
      author_name: 'You',
      content: content,
      created_at: Date.now(),
      edited_at: null,
      parent_message_id: parentId,
    };
    pendingThreadReplyIds.add(tmpId);
    var pendingEl = document.createElement('div');
    pendingEl.className = 'msg is-pending';
    pendingEl.setAttribute('data-reply-id', tmpId);
    pendingEl.setAttribute('data-pending-content', encodeURIComponent(content));
    pendingEl.innerHTML =
      renderAuthorAvatar(optimistic.author_id, optimistic.author_name, null, 36) +
      '<div class="msg-body">' +
        '<div class="msg-meta">' +
          '<span class="msg-author">' + esc(optimistic.author_name) + '</span>' +
          '<span class="msg-ts">' + fmtTime(optimistic.created_at) + '</span>' +
        '</div>' +
        '<div class="msg-text">' + esc(content) + '</div>' +
      '</div>';
    // Only append into the panel if it's still showing the same thread.
    // Otherwise the optimistic row would land in the wrong (or no) panel.
    if (currentThreadId === parentId) {
      threadMsgsEl.appendChild(pendingEl);
      threadMsgsEl.scrollTop = threadMsgsEl.scrollHeight;
    }

    var payload = {
      channel_id: channelId,
      content: content,
      parent_message_id: parentId,
    };
    if (atts.length > 0) payload.attachments = atts;
    request('sendMessage', payload).then(function () {
      pendingThreadReplyIds.delete(tmpId);
      // The message.created event will arrive and dedupe via matching content.
      // If it doesn't arrive (e.g. race), remove pending on a short delay.
      setTimeout(function () {
        var still = threadMsgsEl.querySelector('[data-reply-id="' + tmpId + '"]');
        if (still) still.classList.remove('is-pending');
      }, 100);
    }).catch(function (err) {
      pendingThreadReplyIds.delete(tmpId);
      var el = threadMsgsEl.querySelector('[data-reply-id="' + tmpId + '"]');
      if (!el) return;
      el.classList.remove('is-pending');
      el.classList.add('is-failed');
      var tx = el.querySelector('.msg-text');
      if (tx) {
        var errMsg = (err && err.message) ? err.message : 'unknown error';
        // Replace text + append a retry pill. textContent first to scrub any
        // prior content, then DOM-build the retry button (no innerHTML +
        // string interpolation around err.message).
        tx.textContent = 'Failed to send: ' + errMsg + ' ';
        var retry = document.createElement('button');
        retry.type = 'button';
        retry.className = 'msg-retry';
        retry.textContent = 'Retry';
        retry.addEventListener('click', function (ev) {
          ev.stopPropagation();
          // Drop the failed row and resubmit with the original content,
          // parent, and attachments. submitThreadReply will create a new
          // optimistic row.
          el.remove();
          submitThreadReply(content, channelId, parentId, atts);
        });
        tx.appendChild(retry);
      }
    });
  }

  // ── Typing ping (shared by channel composer + thread composer) ────────────
  // `isThread` must reflect WHICH composer triggered this, not just whether a
  // thread panel is open. Without it, typing in the channel composer while a
  // thread panel is visible would incorrectly fire on the thread scope.
  function typingScopeKey(isThread) {
    return (currentChannelId || '') + '|' + (isThread ? (currentThreadId || '') : '');
  }

  function beginTyping(isThread) {
    if (!currentChannelId) return;
    if (isThread && !currentThreadId) return;
    var key = typingScopeKey(isThread);
    // If we're already pinging a different scope, leave it first so indicators
    // don't stick on the wrong channel/thread.
    if (activeTypingScopeKey && activeTypingScopeKey !== key) stopTypingIfActive();
    activeTypingScopeKey = key;
    var params = { channel_id: currentChannelId, typing: true };
    if (isThread) params.thread_id = currentThreadId;
    request('setTyping', params).catch(function () {});

    if (typingPingTimer) clearInterval(typingPingTimer);
    typingPingTimer = setInterval(function () {
      if (activeTypingScopeKey !== key) return;
      request('setTyping', params).catch(function () {});
    }, 2_000);

    if (typingStopTimer) clearTimeout(typingStopTimer);
    typingStopTimer = setTimeout(function () { stopTypingIfActive(); }, 3_000);
  }

  function stopTypingIfActive() {
    if (!activeTypingScopeKey) {
      if (typingPingTimer) { clearInterval(typingPingTimer); typingPingTimer = null; }
      if (typingStopTimer) { clearTimeout(typingStopTimer); typingStopTimer = null; }
      return;
    }
    var parts = activeTypingScopeKey.split('|');
    var channelId = parts[0], threadId = parts[1];
    var params = { channel_id: channelId, typing: false };
    if (threadId) params.thread_id = threadId;
    request('setTyping', params).catch(function () {});
    activeTypingScopeKey = null;
    if (typingPingTimer) { clearInterval(typingPingTimer); typingPingTimer = null; }
    if (typingStopTimer) { clearTimeout(typingStopTimer); typingStopTimer = null; }
  }

  function renderTyping(payload) {
    var users = (payload && payload.users) || [];
    // Filter out self — users don't need to see "you are typing"
    users = users.filter(function (u) { return u.user_id !== myUserId; });

    var scope = payload && payload.scope;
    if (typeof scope !== 'string') return;
    // Determine target container
    if (scope.indexOf('text-channels.thread.') === 0) {
      // Thread typing — only show if the panel is open for this thread
      var threadId = scope.split('.')[2];
      if (currentThreadId !== threadId) return;
      threadTypingEl.innerHTML = renderTypingLine(users);
    } else if (scope.indexOf('text-channels.channel.') === 0) {
      var channelId = scope.split('.')[2];
      if (currentChannelId !== channelId) return;
      typingBar.innerHTML = renderTypingLine(users);
    }
  }

  function renderTypingLine(users) {
    if (users.length === 0) return '';
    var names = users.map(function (u) { return u.display_name || shortName(u.user_id); });
    var label;
    if (names.length === 1) label = names[0] + ' is typing';
    else if (names.length === 2) label = names[0] + ' and ' + names[1] + ' are typing';
    else label = names.length + ' people are typing';
    return '<span class="typing-line">' +
      '<span class="typing-dots"><span></span><span></span><span></span></span>' +
      '<span>' + esc(label) + '…</span>' +
    '</span>';
  }

  function updateViewersCount(payload) {
    var scope = payload && payload.scope;
    if (typeof scope !== 'string') return;
    if (scope.indexOf('text-channels.thread.') !== 0) return;
    var threadId = scope.split('.')[2];
    if (currentThreadId !== threadId) return;
    threadViewerCount = payload.count || 0;
    threadViewerCountEl.textContent = String(threadViewerCount);
  }

  // ── Events ─────────────────────────────────────────────────────────────────
  function handleEvent(topic, payload) {
    if (!payload) return;

    if (topic === 'text-channels.message.created') {
      if (payload.channel_id !== currentChannelId) return;
      if (payload.parent_message_id) {
        // Reply: refresh parent pill on the channel view and, if the panel is
        // open for that parent, append into the thread panel.
        var cachedParent = updateRootCounters(payload.parent_message_id, payload.created_at);
        if (cachedParent) refreshPillFor(cachedParent);
        if (currentThreadId === payload.parent_message_id) {
          appendThreadReply(payload);
        }
      } else {
        appendMessage(payload, true);
      }
    }

    if (topic === 'text-channels.message.edited') {
      var row = document.querySelector('[data-msg-id="' + payload.id + '"]');
      if (row) {
        var t = row.querySelector('.msg-text');
        if (t) t.innerHTML = esc(payload.content) + '<span class="msg-edited-tag">(edited)</span>';
      }
      // Also update in the thread panel
      var tr = threadMsgsEl.querySelector('[data-reply-id="' + payload.id + '"] .msg-text');
      if (tr) tr.innerHTML = esc(payload.content) + '<span class="msg-edited-tag">(edited)</span>';
    }

    if (topic === 'text-channels.message.deleted') {
      applyTombstone(payload.id);
      // If the deleted row is a root that's currently open as a thread, show
      // a tombstone placeholder in the panel header too.
      if (payload.id === currentThreadId && currentThreadRootMsg) {
        currentThreadRootMsg.content = '[deleted]';
        currentThreadRootMsg.author_id = '[deleted]';
        renderThreadRoot();
      }
    }

    if (topic === 'text-channels.typing.updated') {
      renderTyping(payload);
    }

    if (topic === 'text-channels.viewers.updated') {
      updateViewersCount(payload);
    }

    if (topic === 'text-channels.channel.updated') {
      // The shell repaints the panel header from its own SidebarItem snapshot,
      // but in-iframe state (input placeholder, thread subhead) is owned here.
      // Refresh those when the channel we're currently viewing is renamed.
      if (payload.id === currentChannelId && typeof payload.name === 'string') {
        currentChannelName = payload.name;
        inputEl.placeholder = 'Message #' + payload.name;
        if (currentThreadId) {
          threadSubEl.textContent = 'from #' + payload.name;
        }
      }
    }
  }

  function applyTombstone(id) {
    var targets = document.querySelectorAll('[data-msg-id="' + id + '"], [data-reply-id="' + id + '"]');
    for (var i = 0; i < targets.length; i++) {
      var node = targets[i];
      var text = node.querySelector('.msg-text');
      if (text) {
        text.className = 'msg-text is-deleted';
        text.textContent = 'This message was deleted.';
      }
      var actions = node.querySelector('.msg-actions');
      if (actions) actions.remove();
    }
  }

  // ── Send ───────────────────────────────────────────────────────────────────
  function sendMessage() {
    if (!currentChannelId) return;
    var content = inputEl.value.trim();
    var hasTray = attachState.main.length > 0;
    if (!content && !hasTray) return;
    var channelId = currentChannelId;
    // Wait for any in-flight uploads to settle before sending. We intentionally
    // do not lock the textarea — users can keep typing while uploads complete,
    // and the snapshot here freezes the content for this submission.
    waitForUploads('main').then(function () {
      if (hasErrors('main')) {
        setStatus('Some uploads failed. Remove or retry the failed attachments before sending.');
        return;
      }
      var atts = collectAttachments('main');
      if (!content && atts.length === 0) return;
      inputEl.value = '';
      autoResize(inputEl);
      setStatus('');

      var payload = { channel_id: channelId, content: content };
      if (atts.length > 0) payload.attachments = atts;
      request('sendMessage', payload).then(function () {
        clearTray('main');
      }).catch(function (err) {
        setStatus('Send failed: ' + err.message);
        if (content) inputEl.value = content; // restore text; tray stays so user can retry
      });
    });
  }

  sendBtn.addEventListener('click', sendMessage);

  inputEl.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
    autoResize(inputEl);
  });

  inputEl.addEventListener('input', function () {
    autoResize(inputEl);
    if (inputEl.value.trim().length > 0) beginTyping(false);
  });
  inputEl.addEventListener('blur', function () { stopTypingIfActive(); });

  // ── Thread composer wiring ─────────────────────────────────────────────────
  threadSendBtn.addEventListener('click', sendThreadReply);
  threadCloseBtn.addEventListener('click', closeThread);
  threadInputEl.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendThreadReply();
    }
    autoResize(threadInputEl);
  });
  threadInputEl.addEventListener('input', function () {
    autoResize(threadInputEl);
    if (threadInputEl.value.trim().length > 0) beginTyping(true);
  });
  threadInputEl.addEventListener('blur', function () { stopTypingIfActive(); });
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape' && currentThreadId) closeThread();
  });

  // ── Auto-resize textarea ───────────────────────────────────────────────────
  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 200) + 'px';
  }

  // ── Init ───────────────────────────────────────────────────────────────────
  setStatus('Connecting…');

  try {
    sdk = await createPluginFrontend();
  } catch (err) {
    setStatus('Failed to connect: ' + (err && err.message ? err.message : String(err)));
    return;
  }

  parseToken(sdk.token);
  setStatus('');
  enableInput();

  // ── Avatar click → user card ─────────────────────────────────────────────
  // Single delegated listener per surface. The `.msg-author-avatar` button
  // bubbles its click here; we read the data-uc-* attrs and ask the shell
  // to surface its user card. Stop propagation so the message row's own
  // hover/edit affordances don't react to the avatar click.
  function attachAvatarClickHandler(rootEl) {
    if (!rootEl) return;
    rootEl.addEventListener('click', function (ev) {
      var btn = ev.target && ev.target.closest && ev.target.closest('.msg-author-avatar');
      if (!btn) return;
      ev.stopPropagation();
      var userId = btn.getAttribute('data-uc-user-id');
      if (!userId) return;
      var displayName = btn.getAttribute('data-uc-display-name') || userId;
      var avatarUrl = btn.getAttribute('data-uc-avatar-url') || null;
      sdk.platform.userCard.show({
        userId: userId,
        displayName: displayName,
        avatarUrl: avatarUrl,
      });
    });
  }
  attachAvatarClickHandler(msgList);
  attachAvatarClickHandler(threadMsgsEl);
  attachAvatarClickHandler(threadRootEl);

  // Context menu surfaces: right-click on desktop, long-press on touch/pen.
  // Both delegate at the list root so newly-appended rows are picked up
  // automatically. The thread root (single message, sticky header) gets its
  // own attach so the deep-link / opened-thread root is also actionable.
  attachLongPress(msgList);
  attachLongPress(threadMsgsEl);
  attachLongPress(threadRootEl);
  attachRightClick(msgList);
  attachRightClick(threadMsgsEl);
  attachRightClick(threadRootEl);

  // Attachments — pickers, drag-drop, paste, and image-grid → lightbox.
  wireAttachButton(attachBtn, attachInput, 'main');
  wireAttachButton(threadAttachBtn, threadAttachInput, 'thread');
  wireDragDrop();
  wirePaste();
  attachImageClickHandler(msgList);
  attachImageClickHandler(threadMsgsEl);
  attachImageClickHandler(threadRootEl);
  attachPreviewClickHandler(msgList);
  attachPreviewClickHandler(threadMsgsEl);
  attachPreviewClickHandler(threadRootEl);

  sdk.onNavigate(function (nav) {
    selectChannel(nav.itemId, nav.itemLabel, '');
  });

  sdk.subscribe('text-channels.message.created', function (p) { handleEvent('text-channels.message.created', p); });
  sdk.subscribe('text-channels.message.edited',  function (p) { handleEvent('text-channels.message.edited',  p); });
  sdk.subscribe('text-channels.message.deleted', function (p) { handleEvent('text-channels.message.deleted', p); });
  sdk.subscribe('text-channels.typing.updated',  function (p) { handleEvent('text-channels.typing.updated',  p); });
  sdk.subscribe('text-channels.viewers.updated', function (p) { handleEvent('text-channels.viewers.updated', p); });
  sdk.subscribe('text-channels.channel.updated', function (p) { handleEvent('text-channels.channel.updated', p); });
  sdk.subscribe('text-channels.attachments.settings_updated', function (p) { applyAttSettings(p); });

  // Pull current attachment limits so the tray's pre-flight cap matches what
  // the backend will accept. Without this the frontend rejects on the old
  // hardcoded default before the file ever reaches the runtime.
  sdk.request('getAttachmentSettings', {}).then(applyAttSettings).catch(function () {});

  // Deep-link: ?thread=<message_id> opens the panel on load.
  try {
    var params = new URLSearchParams(window.location.search);
    var deepThreadId = params.get('thread');
    if (deepThreadId) {
      // We need the root message to open the panel. Wait for loadMessages to
      // run via selectChannel; hook into rootMsgCache once populated. Poll
      // briefly, then fall back to a direct lookup.
      var start = Date.now();
      var poll = setInterval(function () {
        var cached = rootMsgCache.get(deepThreadId);
        if (cached) {
          clearInterval(poll);
          openThread(cached);
        } else if (Date.now() - start > 3_000) {
          clearInterval(poll);
          setStatus('Thread unavailable or message not found.');
          try {
            var url = new URL(window.location.href);
            url.searchParams.delete('thread');
            history.replaceState(null, '', url.toString());
          } catch (_) {}
        }
      }, 150);
    }
  } catch (_) {}

})();
</script>
</body>
</html>
