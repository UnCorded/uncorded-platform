services:
  server:
    build:
      context: ../
      dockerfile: docker/Dockerfile
    # Restart on crash/oom; `unless-stopped` leaves the container down when the
    # operator stops it deliberately. Required for unattended deployments
    # (homelab, compose-based prod) — without it, a single crashed plugin that
    # kills the runtime takes the server permanently offline.
    restart: unless-stopped
    ports:
      - "3000:3000"
    # Host-side path for tunnel reach-back; set to the operator's public URL.
    # Documented here so compose users know the runtime needs it when not
    # behind a Cloudflare tunnel.
    environment:
      UNCORDED_PUBLIC_URL: ${UNCORDED_PUBLIC_URL:-http://localhost:3000}
    volumes:
      - uncorded-plugins:/plugins
      - uncorded-data:/data
      - uncorded-config:/config
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    init: true
    tmpfs:
      - /tmp

volumes:
  uncorded-plugins:
  uncorded-data:
  uncorded-config:
